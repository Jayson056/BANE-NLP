<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #0a0a0c;
            --card: #16161a;
            --accent: #6366f1;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0c;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #e2e8f0;
        }

        .wrapper {
            width: 100%;
            table-layout: fixed;
            background-color: #0a0a0c;
            padding-bottom: 40px;
        }

        .main {
            background-color: #16161a;
            margin: 0 auto;
            width: 100%;
            max-width: 600px;
            border-spacing: 0;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 40px;
        }

        .header {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: -1px;
            font-weight: 700;
            color: #ffffff;
        }

        .content {
            padding: 40px;
            line-height: 1.6;
        }

        .content h2 {
            color: #ffffff;
            margin-top: 0;
        }

        .content p {
            color: #94a3b8;
            font-size: 17px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .footer {
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #475569;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .button {
            display: inline-block;
            padding: 12px 24px;
            background-color: #6366f1;
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 20px;
        }

        .signature {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <table class="main">
            <tr>
                <td class="header">
                    <h1>{{SUBJECT}}</h1>
                </td>
            </tr>
            <tr>
                <td class="content">
                    <p>{{MESSAGE}}</p>

                    <div class="signature">
                        <p style="margin:0; color:#ffffff; font-weight:600;">Best regards,</p>
                        <p style="margin:0; color:#6366f1; font-weight:700; font-size:18px;">Jayson Apable Combate</p>
                        <p style="margin:0; font-size:14px; color:#94a3b8;">IT Student, Polytechnic University of the
                            Philippines</p>
                    </div>

                    <a href="https://jayson056.space" class="button">Visit Jayson Web Portfolio</a>
                </td>
            </tr>
            <tr>
                <td class="footer">
                    BSIT Student • Polytechnic University of the Philippines<br>
                    jayson.combate05@gmail.com | Manila, Philippines
                </td>
            </tr>
        </table>
    </div>
</body>

</html>
